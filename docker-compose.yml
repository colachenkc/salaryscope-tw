version: "3.9"

# Production-shape local stack for SalaryScope TW.
# The default demo uses SQLite + in-process queues so a grader can run the
# project without Docker. This compose file mirrors the components described
# in §4 of the report when you want to exercise the production layout.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: salaryscope
      POSTGRES_PASSWORD: salaryscope
      POSTGRES_DB: salaryscope
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./storage/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U salaryscope"]
      interval: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: salaryscope
      MINIO_ROOT_PASSWORD: salaryscope
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    environment:
      INGEST_DSN: postgresql+psycopg2://salaryscope:salaryscope@postgres:5432/salaryscope
      OBJECT_STORE_URL: http://minio:9000
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

volumes:
  pgdata:
  redisdata:
  miniodata:
